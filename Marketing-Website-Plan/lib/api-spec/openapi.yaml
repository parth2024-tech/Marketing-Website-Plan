openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist email signup
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      description: Submit an email address to join the Sentinel waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistEntry"
      responses:
        "201":
          description: Successfully joined the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResult"
        "409":
          description: Email already on the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResult"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getWaitlistCount
      tags: [waitlist]
      summary: Get waitlist count
      description: Returns the total number of waitlist signups
      responses:
        "200":
          description: Waitlist count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistCount"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WaitlistEntry:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to join the waitlist
      required:
        - email
    WaitlistResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        alreadyExists:
          type: boolean
      required:
        - success
        - message
    WaitlistCount:
      type: object
      properties:
        count:
          type: integer
          description: Total number of waitlist signups
      required:
        - count
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error
