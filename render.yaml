services:
  - type: web
    name: sentinel-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    # Build only the API server — skips full workspace typecheck that fails on Render
    buildCommand: "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build"
    startCommand: "node artifacts/api-server/dist/index.mjs"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
